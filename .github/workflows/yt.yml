name: yt-transcript

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL or video ID'
        required: true
      language:
        description: 'Subtitle language'
        required: false
        default: 'zh-Hans'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: pip install youtube-transcript-api yt-dlp

      - name: Write cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: echo "$YOUTUBE_COOKIES" > /tmp/cookies.txt && wc -l /tmp/cookies.txt

      - name: Run
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          LANG_CODE: ${{ github.event.inputs.language }}
        run: |
          python3 - << 'EOF'
          import sys, os, re, json, urllib.request, http.cookiejar

          video_input = os.environ['VIDEO_URL']
          lang = os.environ.get('LANG_CODE', 'zh-Hans')

          match = re.search(r'(?:v=|youtu\.be/)([A-Za-z0-9_-]{11})', video_input)
          video_id = match.group(1) if match else video_input.strip()
          print(f"Video ID: {video_id}")

          # 加载 cookies 到 requests session
          import requests
          session = requests.Session()
          session.headers.update({
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Accept-Language': 'zh-CN,zh;q=0.9',
          })

          cj = http.cookiejar.MozillaCookieJar('/tmp/cookies.txt')
          try:
              cj.load(ignore_discard=True, ignore_expires=True)
              print(f"已加载 {len(list(cj))} 个 cookies")
              session.cookies = requests.cookies.RequestsCookieJar()
              for c in cj:
                  session.cookies.set(c.name, c.value, domain=c.domain, path=c.path)
          except Exception as e:
              print(f"Cookie 加载: {e}")

          from youtube_transcript_api import YouTubeTranscriptApi
          api = YouTubeTranscriptApi(http_client=session)

          fetched = None
          for try_lang in [lang, 'zh-Hans', 'zh', 'en']:
              try:
                  fetched = api.fetch(video_id, languages=[try_lang])
                  print(f"成功: {try_lang}")
                  break
              except Exception as e:
                  print(f"  {try_lang}: {str(e)[:100]}")

          if not fetched:
              # 降级：用 yt-dlp 的 --cookies 参数
              print("youtube-transcript-api 失败，尝试 yt-dlp...")
              import subprocess, glob
              result = subprocess.run([
                  'yt-dlp', '--write-auto-sub', '--write-sub',
                  '--sub-langs', lang, '--skip-download',
                  '--cookies', '/tmp/cookies.txt',
                  '--output', f'output/%(id)s.%(ext)s',
                  f'https://youtu.be/{video_id}'
              ], capture_output=True, text=True)
              print(result.stdout[-500:])
              print(result.stderr[-500:])
              # 找下载的字幕文件
              files = glob.glob(f'output/{video_id}*.vtt') + glob.glob(f'output/{video_id}*.srt')
              if files:
                  print(f"yt-dlp 成功: {files}")
                  sys.exit(0)
              sys.exit(1)

          lines = []
          for s in list(fetched):
              ms = int(float(s.start) * 1000)
              ts = f"[{ms//3600000:02d}:{(ms%3600000)//60000:02d}:{(ms%60000)//1000:02d}]"
              if s.text.strip():
                  lines.append(f"{ts} {s.text.strip()}")

          title, channel = video_id, ""
          try:
              req = urllib.request.Request(
                  f"https://www.youtube.com/oembed?url=https://youtu.be/{video_id}&format=json",
                  headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=10) as r:
                  meta = json.loads(r.read())
                  title = meta.get('title', video_id)
                  channel = meta.get('author_name', '')
          except: pass

          os.makedirs('output', exist_ok=True)
          out = f"output/{video_id}.md"
          with open(out, 'w') as f:
              f.write(f"# {title}\n\n**频道**：{channel}  \n**链接**：https://youtu.be/{video_id}\n\n---\n\n")
              f.write('\n'.join(lines))
          print(f"✅ {out} ({len(lines)} segs)")
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: transcript
          path: output/

      - name: Commit
        run: |
          git config user.name "minis-agent"
          git config user.email "minis@agent.local"
          git add output/
          git diff --cached --quiet || (git commit -m "transcript: ${{ github.event.inputs.video_url }}" && git push)
