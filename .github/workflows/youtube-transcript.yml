name: YouTube Transcript

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL or video ID'
        required: true
      language:
        description: 'Subtitle language (e.g. zh-Hans, en)'
        required: false
        default: 'zh-Hans'

jobs:
  fetch-transcript:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install youtube-transcript-api

      - name: Write fetch script
        run: |
          cat > fetch.py << 'ENDOFSCRIPT'
import sys, os, re

video_input = os.environ['VIDEO_URL']
lang = os.environ.get('LANG_CODE', 'zh-Hans')

# 提取 video ID
match = re.search(r'(?:v=|youtu\.be/|/embed/|/shorts/)([A-Za-z0-9_-]{11})', video_input)
video_id = match.group(1) if match else video_input.strip()
print(f"Video ID: {video_id}")

from youtube_transcript_api import YouTubeTranscriptApi
api = YouTubeTranscriptApi()

# 列出可用字幕
transcript_list = api.list(video_id)
available = [(t.language_code, t.language, t.is_generated) for t in transcript_list]
print(f"可用字幕: {available}")

# 按优先级选语言
fetched = None
for try_lang in [lang, 'zh-Hans', 'zh', 'en']:
    try:
        fetched = api.fetch(video_id, languages=[try_lang])
        print(f"使用语言: {try_lang}")
        break
    except Exception as e:
        print(f"  {try_lang} 失败: {e}")

if not fetched:
    print("ERROR: 无法获取任何字幕")
    sys.exit(1)

# 格式化输出
snippets = list(fetched)
lines = []
for s in snippets:
    ms = int(float(s.start) * 1000)
    h = ms // 3600000
    m = (ms % 3600000) // 60000
    sec = (ms % 60000) // 1000
    ts = f"[{h:02d}:{m:02d}:{sec:02d}]"
    text = s.text.strip()
    if text:
        lines.append(f"{ts} {text}")

# 获取视频标题（简单方式）
title = video_id
channel = ""
try:
    import urllib.request
    req = urllib.request.Request(
        f"https://www.youtube.com/oembed?url=https://youtu.be/{video_id}&format=json",
        headers={"User-Agent": "Mozilla/5.0"}
    )
    import json
    with urllib.request.urlopen(req, timeout=10) as r:
        meta = json.loads(r.read())
        title = meta.get('title', video_id)
        channel = meta.get('author_name', '')
except Exception as e:
    print(f"标题获取失败（不影响字幕）: {e}")

os.makedirs('output', exist_ok=True)
out = f"output/{video_id}.md"
with open(out, 'w') as f:
    f.write(f"# {title}\n\n")
    f.write(f"**频道**：{channel}  \n")
    f.write(f"**链接**：https://youtu.be/{video_id}\n\n---\n\n")
    f.write('\n'.join(lines))

print(f"✅ 已保存: {out}，共 {len(lines)} 段")
ENDOFSCRIPT

      - name: Fetch transcript
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          LANG_CODE: ${{ github.event.inputs.language }}
        run: python3 fetch.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: transcript
          path: output/

      - name: Commit result
        run: |
          git config user.name "minis-agent"
          git config user.email "minis@agent.local"
          git add output/
          git diff --cached --quiet || git commit -m "transcript: ${{ github.event.inputs.video_url }}"
          git push
